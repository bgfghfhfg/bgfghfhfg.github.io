<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papa's Scooperia Fullscreen x4</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-L7856P3VNT');
</script>

<!-- Ruffle SWF player -->
<script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

#gameWrapper {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transform: scale(4); /* make 4x bigger */
  transform-origin: top left; /* adjust starting point */
}

/* Make SWF object fill the wrapper */
#gameWrapper object,
#gameWrapper embed {
  width: 100%;
  height: 100%;
  display: block;
}

/* Sidebar Ads */
#sidebarad1,
#sidebarad2 {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  height: 300px;
  z-index: 9999;
}

#sidebarad1 { left: 0; }
#sidebarad2 { right: 0; }

/* Close button for ads */
.sidebar-close {
  position: absolute;
  top: 0;
  right: 0;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- Game container -->
<div id="gameWrapper">
  <object>
    <param name="movie" value="https://cdn.jsdelivr.net/gh/Bescr01/swf@e2ab9deab96c02aaa67e56334d34ccea3bbb8a3e/Papa's%20Scooperia.swf">
    <embed src="https://cdn.jsdelivr.net/gh/Bescr01/swf@e2ab9deab96c02aaa67e56334d34ccea3bbb8a3e/Papa's%20Scooperia.swf">
  </object>
</div>

<!-- Sidebar ads -->
<div id="sidebarad1">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>

<div id="sidebarad2">
  <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>

<!-- Auto-fullscreen on load -->
<script>
window.onload = function() {
  const elem = document.getElementById('gameWrapper');
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); // Chrome/Chromebook
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); // IE/Edge
};
</script>

</body>
</html>
